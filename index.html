<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="このサイトはK.Takeuchiのポートフォリオサイトです。">
    <title>lrf141.github.io</title>
    <script src="js/jquery-3.2.1.min.js"></script>

    <style>
        body{
    margin: 0;
    padding: 0;
}

.content {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background-color: black;
    font-size: 50px;
    color: white;
    font-family: georgia,'times new roman',serif;
    font-variant: small-caps;
}

.content ul{
    text-align: center;
}

.content li{
    display: inline-block;
    padding: 0 20px;
    font-size: 40px;
    width: 100px;
    height: 50px;
}

.content li:hover{
    background-color: white;
    color: black;
}

.profile {
    display: none;
    width: 100%;
    height:100%;
    text-align: center;
    position: fixed;
    top: 0;
    z-index: 100;
    background: rgba(0,0,0,0.95);
    font-size: 30px;
}

.making {
    display: none;
    width: 100%;
    height:100%;
    text-align: center;
    position: fixed;
    top: 0;
    z-index: 100;
    background: rgba(0,0,0,0.95);
    font-size: 30px;
}


.close{
    color: #717171;
    width: 70px;
    margin: auto;
    text-align: center;
    font-size: 30px;
    padding:5px 0 5px 10px;
    border-radius: 3px;
    cursor: pointer;
}
    </style>
    <script type="text/javascript">
        $(function() {
            $(".intro").click(function() {
                $(".profile").fadeIn();
            });
            $(".close").click(function() {
                $(".profile").fadeOut();
            });
            $(".make").click(function() {
                $(".making").fadeIn();
            });
            $(".close").click(function() {
                $(".making").fadeOut();
            });
        });
    </script>
</head>
<body>

<div class="content">
    <h1>Hello world.</h1>
    <ul>
        <li>Home</li>
        <li class="intro">Intro</li>
        <li class="make">Make</li>
        <li class="link">Link</li>
    </ul>
    <div class="profile">
        <h3>Introduction</h3>
        <h4>name</h4>
        <p>lrf141</p>

        <h4>language</h4>
        <p>Scala, Java</p>
        <div class="close"><h4>close</h4></div>
    </div>

    <div class="making">
        <h3>Make</h3>
        <h4>Twitter4S</h4>
        <div class="close"><h4>close</h4></div>
    </div>
</div>

</body>
</html>
