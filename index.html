<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="このサイトはK.Takeuchiのポートフォリオサイトです。">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>lrf141.github.io</title>
    <script src="js/jquery-3.2.1.min.js"></script>

    <style>
        body{
            margin: 0;
            padding: 0;
            background-image: url(img/bkg.jpg);
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-color: black;
        }

        .content {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-family: georgia,'times new roman',serif;
            font-variant: small-caps;
            font-size: 50px;
        }

        .content li{
            font-size: 50px;
        }

        .content ul{
            text-align: center;
        }

        .content li{
            display: inline-block;
            padding: 0 20px;
            font-size: 40px;
            width: 100px;
            height: 50px;
        }

        .profile {
            display: none;
            width: 100%;
            height:100%;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            font-size: 30px;
        }

        .making {
            display: none;
            width: 100%;
            height:100%;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            font-size: 30px;
        }

        .links {
            display: none;
            width: 100%;
            height:100%;
            text-align: center;
            position: fixed;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            font-size: 30px;
        }

        .close{
            color: #717171;
            width: 70px;
            margin: auto;
            text-align: center;
            font-size: 30px;
            padding:5px 0 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        @media screen and (max-width: 479px){
            .content{
                font-size: 50px;
            }
        }
    </style>
    <script type="text/javascript">
        $(function() {
            $(".intro").click(function() {
                $(".profile").fadeIn();
            });
            $(".close").click(function() {
                $(".profile").fadeOut();
            });
            $(".make").click(function() {
                $(".making").fadeIn();
            });
            $(".close").click(function() {
                $(".making").fadeOut();
            });
            $(".link").click(function() {
                $(".links").fadeIn();
            });
            $(".close").click(function() {
                $(".links").fadeOut();
            });
        });
    </script>
</head>
<body>

<div class="content">
    <h1>Hello world.</h1>
    <ul>
        <li>Home</li>
        <li class="intro">Intro</li>
        <li class="make">Make</li>
        <li class="link">Link</li>
    </ul>
    <div class="profile">
        <h2>Introduction</h2>
        <h3>name</h3>
        <p>lrf141</p>
        <h3>Job</h3>
        <p>Student/Engineer</p>
        <h3>language</h3>
        <p>Scala, Java</p>
        <div class="close"><h4>close</h4></div>
    </div>

    <div class="making">
        <h2>Make</h2>
        <h3>Twitter4S</h3>
        <p>Scala Wrapper for the Twitter API</p>

        <h3>This site</h3>
        <p>Using Html5,CSS,jquery</p>
        <div class="close"><h4>close</h4></div>
    </div>

    <div class="links">
        <h2>Link</h2>
        <h3>Twitter</h3>
        <p><a href="https://twitter.com/lrf141">@lrf141</a></p>
        <h3>Github</h3>
        <p><a href="https://github.com/lrf141">lrf141</a></p>
    <div class="close"><h4>close</h4></div>
</div>
</div>

</body>
</html>
